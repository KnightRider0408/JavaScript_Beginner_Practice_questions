<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="NewsFlash – Browse top Hacker News stories by topic in real time." />
  <title>NewsFlash – Hacker News Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">NewsFlash</span>
      </div>
      <p class="tagline">Powered by Hacker News · Live Stories</p>
    </div>
  </header>

  <!-- ── SEARCH BAR ── -->
  <section class="search-section">
    <div class="search-wrapper">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search any topic… e.g. AI, Bitcoin, Space"
        aria-label="Search topic"
      />
      <button id="searchBtn" class="search-btn" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>

    <!-- Topic chips -->
    <div class="chip-row" id="chipRow">
      <button class="chip active" data-topic="startup">🚀 Startup</button>
      <button class="chip" data-topic="artificial intelligence">🤖 AI</button>
      <button class="chip" data-topic="javascript">💛 JavaScript</button>
      <button class="chip" data-topic="python">🐍 Python</button>
      <button class="chip" data-topic="space">🌌 Space</button>
      <button class="chip" data-topic="bitcoin">₿ Bitcoin</button>
      <button class="chip" data-topic="cybersecurity">🔐 Security</button>
      <button class="chip" data-topic="science">🧬 Science</button>
    </div>
  </section>

  <!-- ── RESULTS META ── -->
  <div class="results-meta" id="resultsMeta"></div>

  <!-- ── LOADER ── -->
  <div class="loader-wrap" id="loader" aria-live="polite">
    <div class="spinner"></div>
    <p class="loader-text">Fetching stories…</p>
  </div>

  <!-- ── ERROR ── -->
  <div class="error-box" id="errorBox" role="alert"></div>

  <!-- ── NEWS GRID ── -->
  <main class="news-grid" id="newsGrid"></main>

  <!-- ── FOOTER ── -->
  <footer class="site-footer">
    <p>Data from <a href="https://hn.algolia.com/" target="_blank" rel="noopener">HN Algolia API</a> · Built for Assignment 12/03/2026</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
