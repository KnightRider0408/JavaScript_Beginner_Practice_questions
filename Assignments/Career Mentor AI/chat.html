<!DOCTYPE html>
<html>

<head>
<title>Career Mentor AI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  --bg-secondary: rgba(255, 255, 255, 0.1);
  --text-primary: #ffffff;
  --text-secondary: #e0e0e0;
  --input-bg: rgba(255, 255, 255, 0.2);
  --input-focus: rgba(255, 255, 255, 0.3);
  --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
  --border: rgba(255, 255, 255, 0.18);
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: var(--bg-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  color: var(--text-primary);
  line-height: 1.6;
}

h2 {
  font-size: clamp(1.8rem, 5vw, 2.5rem);
  margin-bottom: 2rem;
  background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 700;
}

.chat-container {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  max-width: 600px;
  width: 100%;
}

#chat {
  width: 100%;
  padding: 1rem 1.5rem;
  font-size: 1rem;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: var(--input-bg);
  backdrop-filter: blur(10px);
  color: var(--text-primary);
  transition: var(--transition);
  font-family: inherit;
}

#chat::placeholder {
  color: var(--text-secondary);
}

#chat:focus {
  outline: none;
  background: var(--input-focus);
  box-shadow: var(--shadow);
  border-color: rgba(255, 255, 255, 0.5);
  transform: translateY(-2px);
}

button {
  padding: 1rem 2rem;
  font-size: 1rem;
  font-weight: 600;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: white;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
  box-shadow: var(--shadow);
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(240, 147, 251, 0.4);
}

button:active {
  transform: translateY(-1px);
}

#result {
  margin-top: 2rem;
  width: 100%;
  max-height: 500px;
  overflow-y: auto;
  background: var(--bg-secondary);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 2rem;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  text-align: left;
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.3) transparent;
}

#result::-webkit-scrollbar {
  width: 6px;
}

#result::-webkit-scrollbar-track {
  background: transparent;
}

#result::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.3);
  border-radius: 3px;
}

#result p {
  margin-bottom: 1rem;
}

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@media (max-width: 768px) {
  .chat-container {
    gap: 0.75rem;
  }
  
  #chat, button {
    padding: 0.875rem 1.25rem;
  }
  
  #result {
    padding: 1.5rem;
    margin-top: 1.5rem;
  }
}

/* Responsive adjustments */
@media (max-width: 480px) {
  body {
    padding: 15px;
  }
  
  h2 {
    margin-bottom: 1.5rem;
  }
}
</style>

</head>

<body>

<h2>Career Mentor AI Chatbot</h2>

<div class="chat-container">
<input id="chat" type="text" placeholder="Ask your career question...">
<button onclick="sendMessage()">Ask Mentor</button>
</div>

<div id="result"></div>

<script>

const API_KEY = "API_KEY";

async function sendMessage() {

let userText = document.getElementById("chat").value;

const careerPrompt = `
You are an experienced career mentor who helps students choose the right career path.

Instructions:
1. Understand the user's interests and goals.
2. Suggest possible career paths.
3. Recommend important skills they should learn.
4. Provide a clear step-by-step roadmap.
5. Keep the advice practical and beginner-friendly.

Format the answer like this:

Career Analysis:
Possible Career Paths:
Skills to Learn:
Action Plan:

User question: ${userText}
`;

const response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + API_KEY,
{
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
contents: [
{
parts: [
{ text: careerPrompt }
]
}
]
})
}
);

const data = await response.json();

console.log(data);

if(data.candidates){
let aiText = data.candidates[0].content.parts[0].text;
document.getElementById("result").innerText = aiText;
}
else{
document.getElementById("result").innerText = "Error: " + JSON.stringify(data);
}

}

</script>

</body>

</html>
